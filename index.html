<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="icon" href="images/favicon.ico" type="image/x-icon" sizes="96x96" />
  <link rel="stylesheet" href="CSS/styles.css" />
  <title>Contact Page</title>
</head>
<body>
  <main>
    <div class="main-container">
      <header class="header">
        <div class="logo"> <img src="images/Logo.svg" alt=""></div>
        <h1>Interested in our business pricing?</h1>
        <p>Fill out the form to view details and we’ll contact you as soon as possible.</p>
      </header>
      <div class="form-card">
        <form>
          <div class="row">
            <div class="input-group">
              <label>Name</label>
              <input type="text" placeholder="Ethan Johnson">
            </div>
            <div class="input-group">
              <label>Company Email</label>
              <input type="email" placeholder="ethan@johnson.com">
            </div>
          </div>
          <div class="row">
            <div class="input-group">
              <label>Company Size</label>
              <select>
                <option selected>50-100 employees</option>
                <option>1-50 employees</option>
                <option>100+ employees</option>
              </select>
            </div>
            <div class="input-group">
              <label>Subject</label>
              <select>
                <option selected>Building Landing pages</option>
                <option>Pricing Inquiry</option>
                <option>Technical Support</option>
              </select>
            </div>
          </div>
          <div class="input-group">
            <label>Message</label>
            <textarea rows="4" placeholder="50-100 employees"></textarea>
          </div>
          <button type="submit" class="submit-btn">Contact Sales</button>
        </form>
      </div>
    </div>
</body>
</html>
